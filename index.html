<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>יומן נוכחות - שניידר</title>
    <style>
        :root {
            --primary: #2c3e50;
            --secondary: #34495e;
            --accent: #3498db;
            --bg: #f5f6fa;
            --card-bg: #ffffff;
            --text: #2f3640;
            --border: #dcdde1;
            --week-bg: #edf2f7;
            --bordo: #800020;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 8px;
        }
        .container {
            max-width: 950px;
            margin: 0 auto;
            background: var(--card-bg);
            padding: 10px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }
        h1 {
            text-align: center;
            color: var(--primary);
            margin: 5px 0;
            font-size: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }
        
        .daily-greeting {
            text-align: center;
            margin-bottom: 10px;
            padding: 6px;
            background: #fff;
            border-radius: 6px;
            color: var(--secondary);
            font-size: 12px;
        }
        .daily-greeting .greeting-main {
            font-size: 14px;
            font-weight: bold;
            color: var(--accent);
            display: block;
        }

        .quick-action-panel {
            background: #e8f4fd;
            border: 1px solid var(--accent);
            border-radius: 8px;
            padding: 8px;
            margin-bottom: 12px;
            text-align: center;
        }
        .quick-action-panel h2 {
            margin: 0 0 6px 0;
            color: var(--primary);
            font-size: 13px;
        }
        .quick-buttons {
            display: flex;
            gap: 6px;
            justify-content: center;
        }
        .quick-btn {
            flex: 1;
            padding: 8px 4px;
            font-size: 15px;
            font-weight: bold;
            border-radius: 6px;
            border: none;
            color: white;
            cursor: pointer;
        }
        .quick-btn.btn-in { background-color: #2ecc71; }
        .quick-btn.btn-out { background-color: #e74c3c; }

        .header-controls {
            margin-bottom: 12px;
            padding: 8px;
            background: var(--bg);
            border-radius: 8px;
        }
        .month-nav {
            display: flex;
            align-items: center;
            gap: 12px;
            width: 100%;
            justify-content: center;
            margin-bottom: 6px;
        }
        .settings-panel {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 4px;
            background: #fff;
            padding: 6px;
            border-radius: 6px;
            border: 1px solid var(--border);
        }
        .setting-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 4px;
            font-weight: bold;
            font-size: 11px;
        }
        .setting-item span.calc-val {
            background: #e2e8f0;
            padding: 2px 4px;
            border-radius: 4px;
            font-size: 11px;
            min-width: 40px;
            text-align: center;
            display: inline-block;
        }
        
        .bulk-action-area {
            grid-column: 1 / -1;
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            gap: 6px;
            margin-top: 4px;
            padding-top: 6px;
            border-top: 1px dashed var(--border);
        }
        .bulk-days-row {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            align-items: center;
        }
        .bulk-day-checkbox {
            display: flex;
            align-items: center;
            gap: 2px;
            font-size: 12px;
            font-weight: bold;
            cursor: pointer;
        }
        .bulk-day-checkbox input {
            width: 14px;
            height: 14px;
            cursor: pointer;
        }
        .bulk-buttons-row {
            display: flex;
            justify-content: space-between;
            width: 100%;
            align-items: center;
            margin-top: 2px;
        }

        input[type="number"], input[type="time"], input[type="text"], select, input[type="date"] {
            padding: 2px 4px;
            border: 1px solid var(--border);
            border-radius: 4px;
            font-size: 12px; 
            font-family: inherit;
            height: 24px;
            box-sizing: border-box;
        }
        .setting-item select, .setting-item input { width: 65px; }

        input::placeholder {
            color: #7f8c8d;
            opacity: 0.8;
        }

        .compact-dashboard { margin-bottom: 12px; }
        .dashboard {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 4px;
        }
        .stat-card {
            background: var(--primary);
            color: white;
            padding: 4px 2px;
            border-radius: 6px;
            text-align: center;
            font-size: 10px;
        }
        .stat-card.vacation-card { background: #e67e22; grid-column: span 2; }
        .stat-card.overtime-card { background: #27ae60; }
        .stat-card h3 { margin: 0 0 1px 0; font-size: 10px; font-weight: normal; }
        .stat-card .value { font-size: 14px; font-weight: bold; }
        .stat-card .sub-value { font-size: 9px; opacity: 0.9; }
        .declared-box {
            margin-top: 2px;
            background: rgba(0,0,0,0.15);
            border-radius: 3px;
            padding: 2px;
            font-size: 10px;
        }

        .week-container {
            background: #fff;
            border: 1px solid var(--border);
            border-radius: 6px;
            margin-bottom: 10px;
            overflow: hidden;
        }
        .week-days-wrapper {
            background: #fff;
        }
        .week-summary-header {
            background: var(--primary);
            color: white;
            padding: 6px 10px;
            font-weight: bold;
            font-size: 13px;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .week-summary-header::after { content: '▼'; font-size: 10px; }
        .week-days-wrapper[open] .week-summary-header::after { transform: rotate(180deg); }

        .day-row {
            display: flex;
            flex-direction: column;
            padding: 6px 8px;
            border-bottom: 1px solid var(--border);
            font-size: 13px;
        }
        .day-row:nth-child(even) { background-color: #fdfdfd; }
        .day-row.weekend { background-color: #fffafd; }
        .day-row.today-highlight {
            background-color: #fffde7 !important;
            border: 1.5px solid #fbc02d !important;
        }
        .day-meta {
            display: flex;
            justify-content: space-between;
            font-weight: bold;
            color: var(--secondary);
            margin-bottom: 4px;
            font-size: 13px;
        }
        .inputs-group {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 6px;
            width: 100%;
        }
        .inputs-group select { width: 115px; height: 26px; font-size: 13px; padding: 2px; }
        .time-inputs { display: flex; gap: 4px; align-items: center; }
        .time-block {
            display: flex;
            align-items: center;
            gap: 3px;
            background: #f1f2f6;
            padding: 2px 6px;
            border-radius: 4px;
        }
        .time-display { font-size: 13px; font-weight: bold; min-width: 35px; text-align: center; }
        .punch-btn { padding: 2px 6px; font-weight: bold; border-radius: 4px; font-size: 12px; height: 22px; border: none; color: white; background: #2ecc71; cursor: pointer; }
        .punch-btn.btn-out { background-color: #e74c3c; }
        .edit-btn, .save-btn { padding: 2px 6px; font-size: 12px; height: 24px; cursor: pointer; }
        .edit-btn { background-color: #95a5a6; color: white; border: none; border-radius: 4px;}
        .manual-btn { background-color: #8e44ad; color: white; border: none; border-radius: 4px;}
        .range-btn { background-color: #e67e22; color: white; border: none; border-radius: 4px; padding: 2px 6px; font-size: 12px; height: 24px; cursor: pointer;}
        .daily-total { font-weight: bold; color: var(--accent); font-size: 14px; margin-right: auto;}

        .week-summary-footer {
            padding: 6px 10px;
            font-weight: bold;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 13px;
            border-top: 1px solid #dcdde1;
            background-color: var(--week-bg);
            color: #2c3e50;
        }
        
        .week-diff-badge {
            padding: 3px 6px;
            border-radius: 4px;
            font-weight: bold;
            display: inline-block;
            font-size: 13px;
        }
        .week-diff-badge.plus { background-color: #2ecc71; color: white; }
        .week-diff-badge.minus { background-color: #e74c3c; color: white; }
        .weekly-extra-input { width: 50px !important; height: 22px !important; padding: 2px !important; font-size: 13px !important; }

        .bottom-section {
            margin-top: 12px;
            padding-top: 8px;
            border-top: 1px dashed var(--border);
        }
        .notes-section { background: var(--bg); padding: 8px; border-radius: 6px; border: 1px solid var(--border); }
        .notes-section h3 { margin: 0 0 6px 0; font-size: 14px; }
        .add-task { display: flex; gap: 4px; margin-bottom: 8px; }
        .add-task input { flex-grow: 1; height: 26px; font-size: 13px; }
        .add-task button { height: 26px; padding: 0 10px; font-size: 12px; background-color: var(--accent); color: white; border: none; border-radius: 4px; cursor: pointer; }
        .task-list { list-style: none; padding: 0; margin: 0; }
        .task-item {
            display: flex; align-items: center; gap: 6px;
            background: white; padding: 6px; border-radius: 4px;
            margin-bottom: 3px; font-size: 13px;
        }
        .task-item.done span { text-decoration: line-through; color: #95a5a6; }
        .task-item span { flex-grow: 1; }
        .delete-btn { background-color: #e74c3c; color: white; border: none; padding: 2px 6px; font-size: 11px; border-radius: 3px; cursor: pointer; }

        .whatsapp-btn {
            background-color: #25D366; color: white; width: 100%; padding: 10px;
            font-size: 16px; font-weight: bold; margin-top: 8px; border-radius: 6px;
            display: flex; justify-content: center; align-items: center; gap: 4px; border: none; cursor: pointer;
        }
        .footer-credits { text-align: center; font-size: 10px; color: #7f8c8d; margin-top: 12px; }
        
        @media (min-width: 481px) {
            .day-row { flex-direction: row; justify-content: space-between; padding: 6px 10px; }
            .day-meta { margin-bottom: 0; min-width: 100px; font-size: 14px; }
            .inputs-group { width: auto; justify-content: flex-end; gap: 12px; }
            .inputs-group select { width: 110px; height: 26px; }
            .dashboard { grid-template-columns: repeat(4, 1fr); }
            h1 { font-size: 22px; }
            body { padding: 10px; }
            .container { padding: 15px; }
            .stat-card .value { font-size: 20px; }
        }
    </style>
</head>
<body>

<div class="container">
    <h1>📇⏱️ יומן נוכחות - שניידר</h1>
    <div class="daily-greeting" id="daily-greeting"></div>
    
    <div class="quick-action-panel">
        <h2 id="quick-punch-title">החתמה מהירה להיום</h2>
        <div class="quick-buttons">
            <button class="quick-btn btn-in" onclick="quickPunch('in')">📥 כניסה</button>
            <button class="quick-btn btn-out" onclick="quickPunch('out')">📤 יציאה</button>
        </div>
    </div>
    
    <div class="header-controls">
        <div class="month-nav">
            <button id="prev-month">&lt; הקודם</button>
            <strong id="current-month-display" style="font-size: 16px;"></strong>
            <button id="next-month">הבא &gt;</button>
        </div>
        
        <div class="settings-panel">
            <div class="setting-item">
                <label>תקן חודש:</label>
                <input type="number" id="monthly-target" min="0" placeholder="הזיני...">
            </div>
            <div class="setting-item">
                <label>אחוז משרה (%):</label>
                <input type="number" id="job-pct" min="0" max="100" placeholder="הזיני...">
            </div>
            <div class="setting-item">
                <label>שעות שבועיות:</label>
                <span class="calc-val" id="lbl-weekly-hours">0</span>
            </div>
            <div class="setting-item">
                <label>יום (מערכת):</label>
                <span class="calc-val" id="lbl-daily-value">0:00</span>
            </div>
            
            <div class="bulk-action-area">
                <!-- עדכון טקסט האופציה ל"לבחירה" כפי שביקשת -->
                <label style="font-size:12px; font-weight:bold; color:var(--secondary);">ימי חופשי קבועים בשבוע (לבחירה):</label>
                <div class="bulk-days-row">
                    <label class="bulk-day-checkbox"><input type="checkbox" class="bulk-day-cb" value="0"> א'</label>
                    <label class="bulk-day-checkbox"><input type="checkbox" class="bulk-day-cb" value="1"> ב'</label>
                    <label class="bulk-day-checkbox"><input type="checkbox" class="bulk-day-cb" value="2"> ג'</label>
                    <label class="bulk-day-checkbox"><input type="checkbox" class="bulk-day-cb" value="3"> ד'</label>
                    <label class="bulk-day-checkbox"><input type="checkbox" class="bulk-day-cb" value="4"> ה'</label>
                </div>
                <div class="bulk-buttons-row">
                    <button onclick="applyBulkDaysOff()" style="height:24px; padding:0 8px; font-size:12px; background-color:var(--primary); color:white; border:none; border-radius:4px; cursor:pointer;">📅 החל על כל החודש</button>
                    <button onclick="resetCurrentMonthData()" style="height:24px; padding:0 8px; font-size:12px; background-color:var(--bordo); color:white; border:none; border-radius:4px; cursor:pointer;" title="מחיקת נתוני חודש זה">💥 איפוס החודש</button>
                </div>
            </div>
        </div>
    </div>

    <div class="compact-dashboard">
        <div class="dashboard">
            <div class="stat-card">
                <h3>יעד חודשי</h3>
                <div class="value" id="stat-target">0:00</div>
            </div>
            <div class="stat-card">
                <h3>סך בוצע</h3>
                <div class="value" id="stat-worked">0:00</div>
            </div>
            <div class="stat-card">
                <h3>חסר</h3>
                <div class="value" id="stat-remaining">0:00</div>
            </div>
            <div class="stat-card overtime-card">
                <h3>נוספות</h3>
                <div class="value" id="stat-overtime">0:00</div>
            </div>
            <div class="stat-card vacation-card" style="grid-column: 1 / -1; margin-top:2px; padding: 6px;">
                <h3>מצב הצהרת ימי חופש</h3>
                <div style="display:flex; justify-content:space-around; align-items:center;">
                    <div><span style="font-size:12px;">נדרש להצהיר:</span> <span class="value" id="stat-vacation-days" style="font-size:16px;">0 ימים</span> <span id="stat-vacation-hours" style="font-size:11px;"></span></div>
                    <div class="declared-box" id="stat-vacation-declared" style="margin-top:0; padding:4px 8px;">ביומן: 0 ימים</div>
                </div>
            </div>
        </div>
    </div>

    <div id="calendar-container"></div>

    <div class="bottom-section">
        <div class="notes-section">
            <h3>צ'ק ליסט לסוף חודש</h3>
            <div class="add-task">
                <input type="text" id="new-task-input" placeholder="משימה חדשה...">
                <button onclick="addTask()">הוסף</button>
            </div>
            <ul class="task-list" id="task-list"></ul>
        </div>

        <button class="whatsapp-btn" onclick="sendWhatsAppReport()">
            🟢 שליחת דו"ח מסכם בוואטסאפ
        </button>
    </div>
</div>

<div class="footer-credits">
    &copy; כל הזכויות שמורות לענת מסלנסקי - מרכז שניידר
</div>

<script>
    let currentDate = new Date();
    const maxYear = 2026, maxMonth = 11; 
    let workData = JSON.parse(localStorage.getItem('workHoursData')) || {};
    let editModes = {}; 

    if (!workData.settings) {
        workData.settings = { jobPct: "" };
    }

    const monthDisplay = document.getElementById('current-month-display');
    const calendarContainer = document.getElementById('calendar-container');
    const targetInput = document.getElementById('monthly-target');
    const jobPctInput = document.getElementById('job-pct');

    function init() {
        const now = new Date();
        document.getElementById('quick-punch-title').textContent = `החתמה מהירה (${new Intl.DateTimeFormat('he-IL', { weekday: 'short', day: 'numeric', month: 'short' }).format(now)})`;
        setDailyGreeting(now.getDay());

        jobPctInput.value = workData.settings.jobPct !== undefined ? workData.settings.jobPct : "";
        applyJobPctCalculations();

        targetInput.addEventListener('input', saveSettings);
        jobPctInput.addEventListener('input', () => { applyJobPctCalculations(); saveSettings(); });
        
        document.getElementById('prev-month').addEventListener('click', () => changeMonth(-1));
        document.getElementById('next-month').addEventListener('click', () => changeMonth(1));
        
        renderMonth();
        renderTasks();
    }

    function applyJobPctCalculations() {
        const pct = parseInt(jobPctInput.value);
        if (isNaN(pct) || pct <= 0) {
            document.getElementById('lbl-weekly-hours').textContent = "0";
            document.getElementById('lbl-daily-value').textContent = "0:00";
            return;
        }
        const weeklyHours = (40 * pct) / 100;
        const dailyDecimal = (8 * pct) / 100;
        document.getElementById('lbl-weekly-hours').textContent = weeklyHours;
        document.getElementById('lbl-daily-value').textContent = formatHours(dailyDecimal);
    }

    function setDailyGreeting(dayOfWeek) {
        let message = "";
        const generalMessages = [
            "לא לשכוח 7+", "צדיקה, בחרת ימי הדרכה לסטאז'?", "יום קסום ✨", "הכי בבית - שניידר 🏥", 
            "אפשר להצהיר על ימי ראשון כיום אקדמי", "אל תשכחו לשתות מים! 💧", "נעזרתן היום במחשבון ה-TPN? 💻", 
            "לעדכן שעות איסוף נתונים ומחקר 📊", "צוות של אלופות! שיהיה יום פורה 💪", "לנשום עמוק בין מטופל למטופל 🧘‍♀️"
        ];
        if (dayOfWeek === 0) message = "שביזות יום א' שלום ☕";
        else if (dayOfWeek === 2) message = "פעמיים כי טוב 🌻";
        else if (dayOfWeek === 4) message = "חמישי שמח! 🎉";
        else if (dayOfWeek === 5 || dayOfWeek === 6) message = 'סופ"ש נעים ורגוע 🌸';
        else message = generalMessages[Math.floor(Math.random() * generalMessages.length)];

        document.getElementById('daily-greeting').innerHTML = `<span class="greeting-main">יום טוב ועבודה נעימה!</span><span class="greeting-sub">${message}</span>`;
    }

    function changeMonth(delta) {
        currentDate.setMonth(currentDate.getMonth() + delta);
        editModes = {}; 
        renderMonth();
        renderTasks();
    }

    function getMonthKey() {
        return `${currentDate.getFullYear()}-${String(currentDate.getMonth() + 1).padStart(2, '0')}`;
    }

    function resetCurrentMonthData() {
        const key = getMonthKey();
        const monthText = new Intl.DateTimeFormat('he-IL', { month: 'long', year: 'numeric' }).format(currentDate);
        if (workData[key]) {
            if (confirm(`האם את בטוחה שברצונך למחוק את כל הנתונים של ${monthText}?`)) {
                if (confirm(`שימו לב: פעולה זו תמחוק את כל השעות והתוספות לחודש זה ללא אפשרות שחזור. לאשר סופית?`)) {
                    delete workData[key];
                    localStorage.setItem('workHoursData', JSON.stringify(workData));
                    renderMonth();
                    alert(`נתוני החודש ${monthText} אופסו לחלוטין.`);
                }
            }
        } else { alert('אין נתונים רשומים בחודש זה שניתן לאפס.'); }
    }

    function applyBulkDaysOff() {
        const checkboxes = document.querySelectorAll('.bulk-day-cb');
        let selectedDays = [];
        checkboxes.forEach(cb => {
            if(cb.checked) selectedDays.push(parseInt(cb.value));
        });

        if (selectedDays.length === 0) {
            alert('אנא סמני לפחות יום אחד ב-V לפני הלחיצה.');
            return;
        }

        const key = getMonthKey();
        const year = currentDate.getFullYear(), month = currentDate.getMonth();
        const daysInMonth = new Date(year, month + 1, 0).getDate();
        if (!workData[key]) workData[key] = { days: {}, weeks: {}, tasks: [] };
        
        let count = 0;
        for (let i = 1; i <= daysInMonth; i++) {
            const date = new Date(year, month, i);
            if (selectedDays.includes(date.getDay())) {
                if (!workData[key].days[i]) workData[key].days[i] = {};
                if (!workData[key].days[i].in && !workData[key].days[i].out && !workData[key].days[i].manualHours) {
                    workData[key].days[i].type = 'day_off';
                    count++;
                }
            }
        }
        
        if(count > 0) {
            localStorage.setItem('workHoursData', JSON.stringify(workData));
            renderMonth();
            alert(`הוגדרו בהצלחה ${count} ימי חופשי קבועים לפי הימים שבחרת!`);
        } else {
            alert('לא נמצאו ימים פנויים להגדרה או שהם כבר מכילים נתוני שעות.');
        }
    }

    function applyVacationRange(startDay) {
        const dateInput = document.getElementById(`range-date-${startDay}`);
        if (!dateInput || !dateInput.value) { alert('אנא בחרי תאריך סיום חופשה.'); return; }
        
        const endDateObj = new Date(dateInput.value);
        const year = currentDate.getFullYear(), month = currentDate.getMonth();
        const key = getMonthKey();
        const daysInMonth = new Date(year, month + 1, 0).getDate();
        
        let count = 0;
        for (let d = startDay; d <= daysInMonth; d++) {
            const checkDate = new Date(year, month, d);
            if (checkDate <= endDateObj) {
                const dayOfWeek = checkDate.getDay();
                if (dayOfWeek !== 5 && dayOfWeek !== 6) {
                    if (!workData[key]) workData[key] = { days: {}, weeks: {}, tasks: [] };
                    if (!workData[key].days[d]) workData[key].days[d] = {};
                    workData[key].days[d].type = 'vacation';
                    count++;
                }
            } else { break; }
        }
        
        localStorage.setItem('workHoursData', JSON.stringify(workData));
        renderMonth();
        alert(`הוחלו ${count} ימי חופש בטווח הנבחר (ללא סופי שבוע).`);
    }

    function quickPunch(field) {
        const now = new Date();
        currentDate = new Date(now.getFullYear(), now.getMonth(), 1);
        editModes = {};
        const key = getMonthKey(), todayDate = now.getDate();
        if (!workData[key]) workData[key] = { days: {}, weeks: {}, tasks: [] };
        if (!workData[key].days[todayDate]) workData[key].days[todayDate] = {};
        if(workData[key].days[todayDate].isManualMode) { workData[key].days[todayDate].isManualMode = false; }
        localStorage.setItem('workHoursData', JSON.stringify(workData));
        renderMonth(); 
        setTimeNow(todayDate, field); 
        setTimeout(() => {
            const todayRow = document.getElementById(`row-${todayDate}`);
            if(todayRow) {
                todayRow.scrollIntoView({ behavior: 'smooth', block: 'center' });
            }
        }, 100);
    }

    function saveSettings() {
        const key = getMonthKey();
        if (!workData[key]) workData[key] = { days: {}, weeks: {}, tasks: [] };
        workData[key].target = targetInput.value;
        workData.settings.jobPct = jobPctInput.value;
        localStorage.setItem('workHoursData', JSON.stringify(workData));
        updateDashboard(); 
    }

    function saveData(day, field, value) {
        const key = getMonthKey();
        if (!workData[key]) workData[key] = { days: {}, weeks: {}, tasks: [] };
        if (!workData[key].days[day]) workData[key].days[day] = {};
        workData[key].days[day][field] = value;
        localStorage.setItem('workHoursData', JSON.stringify(workData));
        if (field === 'type') { renderMonth(); } else { updateDashboard(); }
    }

    // פונקציות תוספת שבועית
    function saveWeeklyExtra(weekNum, value) {
        const key = getMonthKey();
        if (!workData[key]) workData[key] = { days: {}, weeks: {}, tasks: [] };
        if (!workData[key].weeks) workData[key].weeks = {};
        if (!workData[key].weeks[weekNum]) workData[key].weeks[weekNum] = {};
        workData[key].weeks[weekNum].extraHours = value;
        localStorage.setItem('workHoursData', JSON.stringify(workData));
        updateDashboard();
    }

    function setTimeNow(day, field) {
        const now = new Date();
        saveData(day, field, `${String(now.getHours()).padStart(2, '0')}:${String(now.getMinutes()).padStart(2, '0')}`);
        renderMonth(); 
    }

    function toggleEditMode(day) { editModes[day] = !editModes[day]; renderMonth(); }
    function toggleManualMode(day) {
        const key = getMonthKey();
        if (!workData[key]) workData[key] = { days: {}, weeks: {}, tasks: [] };
        if (!workData[key].days[day]) workData[key].days[day] = {};
        workData[key].days[day].isManualMode = !workData[key].days[day].isManualMode;
        localStorage.setItem('workHoursData', JSON.stringify(workData));
        renderMonth();
    }

    function addTask() {
        const input = document.getElementById('new-task-input');
        if(!input.value.trim()) return;
        const key = getMonthKey();
        if (!workData[key]) workData[key] = { days: {}, weeks: {}, tasks: [] };
        if (!workData[key].tasks) workData[key].tasks = [];
        workData[key].tasks.push({ text: input.value.trim(), done: false, userAdded: true });
        localStorage.setItem('workHoursData', JSON.stringify(workData));
        input.value = ''; renderTasks();
    }
    function toggleTask(index) {
        const key = getMonthKey(); workData[key].tasks[index].done = !workData[key].tasks[index].done;
        localStorage.setItem('workHoursData', JSON.stringify(workData)); renderTasks();
    }
    function deleteTask(index) {
        const key = getMonthKey(); workData[key].tasks.splice(index, 1);
        localStorage.setItem('workHoursData', JSON.stringify(workData)); renderTasks();
    }
    
    function syncSickLeaveTasks() {
        const key = getMonthKey();
        if (!workData[key]) return;
        if (!workData[key].tasks) workData[key].tasks = [];
        workData[key].tasks = workData[key].tasks.filter(t => !t.text.startsWith("אישור מחלה עבור"));
        for (let day in workData[key].days) {
            if (workData[key].days[day].type === 'sick') {
                workData[key].tasks.push({
                    text: `אישור מחלה עבור תאריך ${day} לחודש`,
                    done: false,
                    userAdded: false
                });
            }
        }
    }

    function renderTasks() {
        const key = getMonthKey();
        const tasks = (workData[key] && workData[key].tasks) ? workData[key].tasks : [];
        const list = document.getElementById('task-list'); list.innerHTML = '';
        tasks.forEach((task, index) => {
            list.innerHTML += `<li class="task-item ${task.done ? 'done' : ''}">
                <input type="checkbox" ${task.done ? 'checked' : ''} onchange="toggleTask(${index})">
                <span>${task.text}</span>
                <button class="delete-btn" onclick="deleteTask(${index})">מחק</button>
            </li>`;
        });
    }

    function formatHours(decimalHours) {
        if (decimalHours <= 0 || isNaN(decimalHours)) return "0:00";
        const hours = Math.floor(decimalHours);
        const minutes = Math.round((decimalHours - hours) * 60);
        return `${hours}:${String(minutes).padStart(2, '0')}`;
    }

    function getSystemDailyValueDecimal() {
        const pct = parseInt(jobPctInput.value);
        if (isNaN(pct) || pct <= 0) return 0;
        return (8 * pct) / 100;
    }

    function calculateTimeDiff(timeIn, timeOut) {
        if (!timeIn || !timeOut) return 0;
        const [inHours, inMins] = timeIn.split(':').map(Number);
        const [outHours, outMins] = timeOut.split(':').map(Number);
        let inDate = new Date(2000, 0, 1, inHours, inMins), outDate = new Date(2000, 0, 1, outHours, outMins);
        if (outDate < inDate) outDate.setDate(outDate.getDate() + 1);
        return (outDate - inDate) / (1000 * 60 * 60);
    }

    function saveWeekState(weekNum, isOpen) { localStorage.setItem(getMonthKey() + `-w${weekNum}`, isOpen ? 'true' : 'false'); }

    function renderMonth() {
        const year = currentDate.getFullYear(), month = currentDate.getMonth();
        document.getElementById('prev-month').disabled = false;
        document.getElementById('next-month').disabled = (year >= maxYear && month >= maxMonth);
        monthDisplay.textContent = new Intl.DateTimeFormat('he-IL', { month: 'long', year: 'numeric' }).format(currentDate);
        
        const key = getMonthKey();
        syncSickLeaveTasks(); 
        const monthData = workData[key] || { days: {}, weeks: {}, tasks: [] };
        if(!monthData.weeks) monthData.weeks = {};
        
        targetInput.value = monthData.target !== undefined ? monthData.target : '';
        calendarContainer.innerHTML = '';
        const daysInMonth = new Date(year, month + 1, 0).getDate();
        
        let weekNum = 1; 
        let currentWeekContainer = null;
        let currentDetailsWrapper = null;
        let startDayOfWeek = 1;

        for (let i = 1; i <= daysInMonth; i++) {
            const date = new Date(year, month, i), dayOfWeek = date.getDay();
            const dayName = new Intl.DateTimeFormat('he-IL', { weekday: 'short' }).format(date);
            const isToday = (date.getDate() === todayObj.getDate() && date.getMonth() === todayObj.getMonth() && date.getFullYear() === todayObj.getFullYear());
            
            if (!currentWeekContainer || (dayOfWeek === 0 && i !== 1)) {
                if (currentWeekContainer) { 
                    appendWeekFooter(currentWeekContainer, weekNum - 1, monthData); 
                    calendarContainer.appendChild(currentWeekContainer); 
                }
                
                startDayOfWeek = i;
                currentWeekContainer = document.createElement('div');
                currentWeekContainer.className = 'week-container';
                
                currentDetailsWrapper = document.createElement('details');
                currentDetailsWrapper.className = 'week-days-wrapper';
                currentDetailsWrapper.dataset.week = weekNum;
                
                const savedState = localStorage.getItem(key + `-w${weekNum}`);
                const isTodayWeek = (todayObj.getMonth() === month && todayObj.getFullYear() === year && i <= todayObj.getDate() && todayObj.getDate() < i + 7 - dayOfWeek);
                if (savedState === 'true' || (savedState === null && (weekNum === 1 || isTodayWeek))) { 
                    currentDetailsWrapper.open = true; 
                }
                currentDetailsWrapper.addEventListener('toggle', function() { saveWeekState(this.dataset.week, this.open); });
                
                currentWeekContainer.appendChild(currentDetailsWrapper);
                weekNum++;
            }
            
            let endDayOfWeek = i;
            let nextDayDate = new Date(year, month, i + 1);
            if (dayOfWeek === 6 || i === daysInMonth || nextDayDate.getDay() === 0) {
                const summary = document.createElement('summary');
                summary.className = 'week-summary-header';
                summary.innerHTML = `<span>שבוע ${weekNum - 1} (${startDayOfWeek} עד ${endDayOfWeek} לחודש)</span><span id="header-week-total-${weekNum - 1}" style="font-size:12px; font-weight:normal;"></span>`;
                
                if (currentDetailsWrapper.firstChild) {
                    currentDetailsWrapper.insertBefore(summary, currentDetailsWrapper.firstChild);
                } else {
                    currentDetailsWrapper.appendChild(summary);
                }
            }
            
            const dayData = monthData.days[i] || {}, isEditing = editModes[i] || false;
            let dayType = dayData.type || 'work';
            const isManualView = dayData.isManualMode || false;
            
            const row = document.createElement('div');
            row.className = `day-row ${dayOfWeek === 5 || dayOfWeek === 6 ? 'weekend' : ''} ${isToday ? 'today-highlight' : ''}`;
            row.id = `row-${i}`; 
            
            let inputsHtml = '';
            if (dayOfWeek === 5 || dayOfWeek === 6) {
                const isChecked = dayData.kitchenDuty ? 'checked' : '';
                inputsHtml = `<div class="inputs-group"><label class="kitchen-duty"><input type="checkbox" onchange="saveData(${i}, 'kitchenDuty', this.checked)" ${isChecked}> תורנות מטבח (+1 שעה)</label></div>`;
            } else {
                const timeIn = dayData.in || '', timeOut = dayData.out || '', manualHours = dayData.manualHours || '';
                let timeControlsHtml = '';
                
                if (dayType === 'work') {
                    if (isManualView) {
                        timeControlsHtml = `
                            <div class="time-inputs">
                                <label style="font-weight:bold; color:var(--primary); font-size:12px;">סה"כ שעות: 
                                <input type="number" step="0.1" min="0" placeholder="מספר" style="width: 55px; height:22px;" value="${manualHours}" oninput="saveData(${i}, 'manualHours', this.value)"></label>
                                <button onclick="toggleManualMode(${i})" class="edit-btn" style="background:#7f8c8d; height:22px; padding:1px 4px;">🔙</button>
                            </div>`;
                    } else if (isEditing) {
                        timeControlsHtml = `
                            <div class="time-inputs">
                                <input type="time" style="height:22px; padding:1px;" value="${timeIn}" onchange="saveData(${i}, 'in', this.value)">
                                <span>עד</span>
                                <input type="time" style="height:22px; padding:1px;" value="${timeOut}" onchange="saveData(${i}, 'out', this.value)">
                                <button onclick="toggleEditMode(${i})" class="save-btn" style="height:22px; padding:1px 4px;">💾</button>
                            </div>`;
                    } else {
                        timeControlsHtml = `
                            <div class="time-inputs">
                                <div class="time-block"><button onclick="setTimeNow(${i}, 'in')" class="punch-btn">כניסה</button><span class="time-display">${timeIn || '--:--'}</span></div>
                                <div class="time-block"><button onclick="setTimeNow(${i}, 'out')" class="punch-btn btn-out">יציאה</button><span class="time-display">${timeOut || '--:--'}</span></div>
                                <button onclick="toggleEditMode(${i})" class="edit-btn">✎</button>
                                <button onclick="toggleManualMode(${i})" class="edit-btn manual-btn">⏳ ידני</button>
                            </div>`;
                    }
                } else if (dayType === 'day_off') { timeControlsHtml = `<span style="color:var(--secondary); font-size:11px; font-weight:bold;">יום חופשי (0 שעות)</span>`;
                } else if (dayType === 'holiday') { timeControlsHtml = `<span style="color: #e74c3c; font-weight: bold; font-size:11px;">חג - תקן הופחת</span>`;
                } else if (dayType === 'sick') { timeControlsHtml = `<span style="color:#b03a2e; font-weight:bold; font-size:11px;">מחלה / הצהרה 🩺</span>`;
                } else if (dayType === 'vacation') { 
                    const formattedMinDate = `${year}-${String(month+1).padStart(2,'0')}-${String(i).padStart(2,'0')}`;
                    timeControlsHtml = `
                        <div class="time-inputs" style="gap:4px;">
                            <span style="color:var(--secondary); font-size:11px;">חופש 🌴</span>
                            <label style="font-size:10px; color:#e67e22;">עד: <input type="date" id="range-date-${i}" min="${formattedMinDate}" style="height:22px; font-size:11px; width:100px; padding:1px;"></label>
                            <button onclick="applyVacationRange(${i})" class="range-btn">📅 החל</button>
                        </div>`;
                } else if (dayType === 'eve') { timeControlsHtml = `<span style="color:var(--secondary); font-size:11px;">ערב חג (מחושב 1/2 יום)</span>`;
                } else if (dayType === 'chol_hamoed') { timeControlsHtml = `<span style="color:var(--secondary); font-size:11px;">חוה"מ (מחושב 3/5 יום)</span>`;
                } else { timeControlsHtml = `<span style="color:var(--secondary); font-size:11px;">מחושב אוטומטית</span>`; }
                
                inputsHtml = `
                    <div class="inputs-group">
                        <select onchange="saveData(${i}, 'type', this.value)" style="height:22px; padding:1px;">
                            <option value="work" ${dayType === 'work' ? 'selected' : ''}>עבודה</option>
                            <option value="day_off" ${dayType === 'day_off' ? 'selected' : ''}>יום חופשי</option>
                            <option value="vacation" ${dayType === 'vacation' ? 'selected' : ''}>חופש 🌴</option>
                            <option value="sick" ${dayType === 'sick' ? 'selected' : ''}>מחלה / הצהרה 🩺</option>
                            <option value="training" ${dayType === 'training' ? 'selected' : ''}>השתלמות</option>
                            <option value="eve" ${dayType === 'eve' ? 'selected' : ''}>ערב חג (1/2)</option>
                            <option value="chol_hamoed" ${dayType === 'chol_hamoed' ? 'selected' : ''}>חוה"מ (3/5)</option>
                            <option value="holiday" ${dayType === 'holiday' ? 'selected' : ''}>חג ללא חישוב</option>
                        </select>
                        ${timeControlsHtml}
                        <div class="daily-total" id="total-${i}">0:00</div>
                    </div>`;
            }
            row.innerHTML = `<div class="day-meta"><span>${i} לחודש</span> | <span>${dayName}</span></div>${inputsHtml}`;
            currentDetailsWrapper.appendChild(row);
        }
        if (currentWeekContainer) { 
            appendWeekFooter(currentWeekContainer, weekNum - 1, monthData); 
            calendarContainer.appendChild(currentWeekContainer); 
        }
        renderTasks(); 
        updateDashboard();
    }

    function appendWeekFooter(container, weekIndex, monthData) {
        const extraHours = (monthData.weeks && monthData.weeks[weekIndex]) ? monthData.weeks[weekIndex].extraHours || '' : '';
        const footer = document.createElement('div'); footer.id = `week-footer-${weekIndex}`; footer.className = 'week-summary-footer';
        footer.innerHTML = `
            <div><label>תוספת: <input type="number" step="0.1" class="weekly-extra-input" placeholder="שעות" value="${extraHours}" oninput="saveWeeklyExtra(${weekIndex}, this.value)"></label></div>
            <div style="color: black;">יעד: <span id="week-target-${weekIndex}">0:00</span> שעות</div>
            <div id="week-diff-container-${weekIndex}">פער: <span id="week-diff-${weekIndex}" class="week-diff-badge">0:00</span></div>
        `;
        container.appendChild(footer);
    }

    function updateDashboard() {
        const key = getMonthKey(); const monthData = workData[key] || { days: {}, weeks: {} };
        if(!monthData.weeks) monthData.weeks = {};
        const baseMonthlyTarget = parseFloat(targetInput.value) || 0;
        const dailyValueDecimal = getSystemDailyValueDecimal();
        
        let adjustedMonthlyTarget = baseMonthlyTarget, totalDecimalWorked = 0, declaredVacationsCount = 0;
        let weeklyWorkedCounter = 0, weekTargetDecimal = 0, weekNum = 1;
        const daysInMonth = new Date(currentDate.getFullYear(), currentDate.getMonth() + 1, 0).getDate();
        
        for (let i = 1; i <= daysInMonth; i++) {
            const dayData = monthData.days[i] || {}, date = new Date(currentDate.getFullYear(), currentDate.getMonth(), i);
            const dayOfWeek = date.getDay(), isWeekend = dayOfWeek === 5 || dayOfWeek === 6;
            let dailyHours = 0; const totalEl = document.getElementById(`total-${i}`);

            if (isWeekend) { 
                if (dayData.kitchenDuty) dailyHours = 1; 
            } else {
                let dayType = dayData.type || 'work';
                
                if (dayType === 'holiday') { adjustedMonthlyTarget -= dailyValueDecimal; if (totalEl) totalEl.textContent = "0:00"; }
                else if (dayType === 'day_off') { dailyHours = 0; if (totalEl) totalEl.textContent = `0:00`; }
                else {
                    if (dayType === 'vacation') { dailyHours = dailyValueDecimal; declaredVacationsCount++; weekTargetDecimal += dailyValueDecimal; if (totalEl) totalEl.textContent = `${formatHours(dailyHours)}`; }
                    else if (dayType === 'sick') { dailyHours = dailyValueDecimal; weekTargetDecimal += dailyValueDecimal; if (totalEl) totalEl.textContent = `${formatHours(dailyHours)}`; }
                    else if (dayType === 'training') { dailyHours = dailyValueDecimal; weekTargetDecimal += dailyValueDecimal; if (totalEl) totalEl.textContent = `${formatHours(dailyHours)}`; }
                    else if (dayType === 'eve') { dailyHours = dailyValueDecimal * 0.5; weekTargetDecimal += dailyValueDecimal * 0.5; if (totalEl) totalEl.textContent = `${formatHours(dailyHours)}`; }
                    else if (dayType === 'chol_hamoed') { dailyHours = dailyValueDecimal * 0.6; weekTargetDecimal += dailyValueDecimal * 0.6; if (totalEl) totalEl.textContent = `${formatHours(dailyHours)}`; } 
                    else if (dayType === 'work') {
                        weekTargetDecimal += dailyValueDecimal;
                        if (dayData.isManualMode) { if (dayData.manualHours) dailyHours = parseFloat(dayData.manualHours) || 0; } 
                        else { dailyHours = calculateTimeDiff(dayData.in, dayData.out); }
                        if (totalEl) totalEl.textContent = formatHours(dailyHours);
                    }
                }
            }
            totalDecimalWorked += dailyHours; weeklyWorkedCounter += dailyHours;

            if (dayOfWeek === 6 || i === daysInMonth) {
                let weekExtraDec = 0; if(monthData.weeks[weekNum] && monthData.weeks[weekNum].extraHours) { weekExtraDec = parseFloat(monthData.weeks[weekNum].extraHours) || 0; }
                weeklyWorkedCounter += weekExtraDec; totalDecimalWorked += weekExtraDec;

                const targetEl = document.getElementById('week-target-' + weekNum);
                const diffEl = document.getElementById('week-diff-' + weekNum);
                const headerPreviewEl = document.getElementById('header-week-total-' + weekNum);
                
                if(targetEl) targetEl.textContent = formatHours(weekTargetDecimal);
                if(headerPreviewEl) headerPreviewEl.textContent = `(בוצע: ${formatHours(weeklyWorkedCounter)})`;

                if (diffEl) {
                    const diffDecimal = weeklyWorkedCounter - weekTargetDecimal;
                    if (diffDecimal >= 0) { diffEl.textContent = `+${formatHours(diffDecimal)} נוספות`; diffEl.className = 'week-diff-badge plus'; } 
                    else { diffEl.textContent = `-${formatHours(Math.abs(diffDecimal))} חסרות`; diffEl.className = 'week-diff-badge minus'; }
                }
                weeklyWorkedCounter = 0; weekTargetDecimal = 0; weekNum++;
            }
        }

        const remainingDecimal = Math.max(0, adjustedMonthlyTarget - totalDecimalWorked);
        const overtimeDecimal = Math.max(0, totalDecimalWorked - adjustedMonthlyTarget);
        
        document.getElementById('stat-target').textContent = formatHours(adjustedMonthlyTarget);
        document.getElementById('stat-worked').textContent = formatHours(totalDecimalWorked);
        document.getElementById('stat-remaining').textContent = formatHours(remainingDecimal);
        document.getElementById('stat-overtime').textContent = formatHours(overtimeDecimal);

        const vacDaysEl = document.getElementById('stat-vacation-days');
        const vacHoursEl = document.getElementById('stat-vacation-hours');
        const vacDeclaredEl = document.getElementById('stat-vacation-declared');
        
        if (remainingDecimal > 0 && dailyValueDecimal > 0) {
            const daysToDeclare = Math.round(remainingDecimal / dailyValueDecimal);
            vacDaysEl.textContent = `${daysToDeclare} ימים`; vacHoursEl.textContent = `(חוסר של ${formatHours(remainingDecimal)})`;
        } else { vacDaysEl.textContent = "0 ימים"; vacHoursEl.textContent = "אין חוסר"; }
        vacDeclaredEl.textContent = `ביומן: ${declaredVacationsCount} ימים`;
    }

    function sendWhatsAppReport() {
        const key = getMonthKey();
        const monthText = document.getElementById('current-month-display').innerText;
        const target = document.getElementById('stat-target').innerText;
        const worked = document.getElementById('stat-worked').innerText;
        const remaining = document.getElementById('stat-remaining').innerText;
        const overtime = document.getElementById('stat-overtime').innerText;
        const vacDays = document.getElementById('stat-vacation-days').innerText;
        const vacDeclared = document.getElementById('stat-vacation-declared').innerText;

        let sickDaysCount = 0;
        if (workData[key] && workData[key].days) {
            for (let d in workData[key].days) {
                if (workData[key].days[d].type === 'sick') sickDaysCount++;
            }
        }

        let report = `*סיכום נוכחות - ${monthText}* 📊\n\n`;
        report += `🎯 יעד חודשי: ${target}\n`;
        report += `✅ סך בוצע: ${worked}\n`;
        if (sickDaysCount > 0) report += `🤒 ימי מחלה מדווחים: ${sickDaysCount} ימים\n`;

        if (remaining !== "0:00") {
            report += `⏳ שעות חסרות: ${remaining}\n`; report += `🏖️ ימי חופש חסרים להצהרה: ${vacDays}\n`;
        } else if (overtime !== "0:00") { report += `🔥 שעות נוספות: ${overtime}\n`; } 
        else { report += `✨ עמידה מדויקת ביעד!\n`; }
        report += `\n📅 ${vacDeclared}\n\nנשלח מיומן נוכחות - מרכז שניידר 🍏`;
        window.open(`https://wa.me/?text=${encodeURIComponent(report)}`, '_blank');
    }

    init();
</script>
</body>
